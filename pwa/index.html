<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="description" content="AP3X Driver — offline-first fleet driver application" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AP3X" />

  <title>AP3X Driver</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/pwa/manifest.json" />

  <!-- Apple touch icon fallback -->
  <link rel="apple-touch-icon" href="/pwa/icons/icon-192.png" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/pwa/css/driver.css" />

  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body>

<!-- ─── SPLASH ──────────────────────────────────────────────────────────────── -->
<div id="splash">
  <div class="splash-logo">AP3X</div>
  <div class="splash-sub">Driver Runtime</div>
  <div class="splash-loader"></div>
</div>

<!-- ─── APP SHELL ────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="logo">AP3X</div>
    <div class="header-status">
      <div class="status-dot online" id="header-status-dot"></div>
      <span id="header-status-label">Online</span>
    </div>
  </header>

  <!-- Offline banner -->
  <div class="offline-banner" id="offline-banner">
    <span>📵</span>
    <span>Offline mode — data will sync when connection returns</span>
  </div>

  <!-- ─── ROUTE VIEW ──────────────────────────────────────────────────────── -->
  <section class="view active" id="view-route" role="main" aria-label="Route">
    <!-- Populated by route-viewer.js -->
  </section>

  <!-- ─── HAZARD VIEW ─────────────────────────────────────────────────────── -->
  <section class="view" id="view-hazard" role="main" aria-label="Hazards">
    <!-- Populated by hazard-reporter.js -->
  </section>

  <!-- ─── TACHOGRAPH VIEW ─────────────────────────────────────────────────── -->
  <section class="view" id="view-tacho" role="main" aria-label="Tachograph">
    <!-- Populated by tacho-logger.js -->
  </section>

  <!-- ─── STATUS VIEW ─────────────────────────────────────────────────────── -->
  <section class="view" id="view-status" role="main" aria-label="Status">
    <!-- Populated by app.js -->
  </section>

  <!-- Bottom nav -->
  <nav class="nav-bar" role="navigation">
    <button class="nav-item active" id="nav-route" data-view="route" aria-label="Route">
      <span class="nav-icon">🗺️</span>
      <span>Route</span>
    </button>
    <button class="nav-item" id="nav-hazard" data-view="hazard" aria-label="Hazards">
      <span class="nav-icon">⚠️</span>
      <span>Hazards</span>
    </button>
    <button class="nav-item" id="nav-tacho" data-view="tacho" aria-label="Hours">
      <span class="nav-icon">⏱</span>
      <span>Hours</span>
    </button>
    <button class="nav-item" id="nav-status" data-view="status" aria-label="Status">
      <span class="nav-icon">📡</span>
      <span>Status</span>
    </button>
  </nav>

</div><!-- /#app -->

<!-- App entry point -->
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="/pwa/js/app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP3X — Master Controller</title>
  <style>
    :root {
      --purple: #7C3AED;
      --dark: #0F0F1A;
      --card: #1A1A2E;
      --border: #2E2E4A;
      --text: #E2E8F0;
      --muted: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 2px;
    }
    header span {
      font-size: 0.8rem;
      color: var(--muted);
      background: #1E1E3A;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
    }
    main { padding: 2rem; max-width: 1000px; margin: 0 auto; }
    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--purple);
    }
    .fleet-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .fleet-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    .fleet-card:hover { border-color: var(--purple); cursor: pointer; }
    .fleet-card .fleet-name { font-weight: 600; font-size: 1rem; }
    .fleet-card .fleet-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .badge-active { background: #14532D; color: #4ADE80; }
    .badge-deploying { background: #1E3A5F; color: #60A5FA; }
    #event-log {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      max-height: 220px;
      overflow-y: auto;
      font-size: 0.78rem;
      font-family: monospace;
      color: var(--muted);
    }
    #event-log .event-entry { padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
    #event-log .event-entry:last-child { border-bottom: none; }
    .event-type { color: var(--purple); font-weight: 600; }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--purple);
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .empty { color: var(--muted); font-size: 0.85rem; padding: 1rem 0; }
  </style>
</head>
<body>

<header>
  <h1>⬡ AP3X</h1>
  <span>Master Controller — Control Plane</span>
</header>

<main>
  <p class="section-title">Quick Actions</p>
  <div class="actions">
    <button class="btn btn-primary" onclick="location.href='fleet-create.html'">+ Create Fleet</button>
    <button class="btn btn-outline" onclick="refreshFleets()">↻ Refresh</button>
    <button class="btn btn-outline" onclick="clearEvents()">Clear Events</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Total Fleets</div>
      <div class="value" id="stat-fleets">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Deployments</div>
      <div class="value" id="stat-deployments">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Events Logged</div>
      <div class="value" id="stat-events">0</div>
    </div>
  </div>

  <p class="section-title">Fleets</p>
  <div class="fleet-list" id="fleet-list">
    <p class="empty">No fleets yet. Create one to get started.</p>
  </div>

  <br />
  <p class="section-title">Event Log</p>
  <div id="event-log"><span class="empty">No events yet.</span></div>
</main>

<div class="toast" id="toast"></div>

<script>
  const AP3X = {
    store: JSON.parse(localStorage.getItem("ap3x_store") || '{"fleets":{},"fleetBrands":{},"deployments":{},"events":[]}')
  };

  function saveStore() {
    localStorage.setItem("ap3x_store", JSON.stringify(AP3X.store));
  }

  function emitEvent(event) {
    const enriched = {
      id: crypto.randomUUID(),
      timestamp: Date.now(),
      status: "pending",
      ...event
    };
    AP3X.store.events.push(enriched);
    saveStore();
    renderEventLog();
    return enriched;
  }

  function createFleet(name) {
    const fleetId = crypto.randomUUID();
    AP3X.store.fleets[fleetId] = {
      id: fleetId,
      name,
      createdAt: Date.now(),
      status: "active",
      config: { vehicles: [], drivers: [], rules: {} }
    };
    emitEvent({ type: "fleet.created", fleetId, payload: AP3X.store.fleets[fleetId] });
    saveStore();
    renderFleets();
    updateStats();
    showToast(`Fleet "${name}" created`);
    return AP3X.store.fleets[fleetId];
  }

  function deployFleet(fleetId) {
    const fleet = AP3X.store.fleets[fleetId];
    if (!fleet) return alert("Fleet not found");
    const deployment = {
      id: crypto.randomUUID(),
      fleetId,
      version: Date.now(),
      status: "deploying",
      createdAt: Date.now()
    };
    AP3X.store.deployments[deployment.id] = deployment;
    emitEvent({ type: "deployment.created", fleetId, payload: deployment });
    saveStore();
    updateStats();
    showToast(`Deployment triggered for ${fleet.name}`);
  }

  function renderFleets() {
    const container = document.getElementById("fleet-list");
    const fleets = Object.values(AP3X.store.fleets);
    if (!fleets.length) {
      container.innerHTML = '<p class="empty">No fleets yet. Create one to get started.</p>';
      return;
    }
    container.innerHTML = fleets.map(f => `
      <div class="fleet-card" onclick="location.href='fleet-detail.html?id=${f.id}'">
        <div>
          <div class="fleet-name">${f.name}</div>
          <div class="fleet-meta">ID: ${f.id.slice(0, 8)}… · Created ${new Date(f.createdAt).toLocaleString()}</div>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <span class="badge badge-active">${f.status}</span>
          <button class="btn btn-outline" style="font-size:0.75rem;padding:0.4rem 0.8rem;"
            onclick="event.stopPropagation();deployFleet('${f.id}')">Deploy</button>
        </div>
      </div>
    `).join("");
  }

  function renderEventLog() {
    const log = document.getElementById("event-log");
    const events = [...AP3X.store.events].reverse().slice(0, 50);
    if (!events.length) { log.innerHTML = '<span class="empty">No events yet.</span>'; return; }
    log.innerHTML = events.map(e => `
      <div class="event-entry">
        <span class="event-type">${e.type}</span>
        &nbsp;·&nbsp;${new Date(e.timestamp).toLocaleTimeString()}
        &nbsp;·&nbsp;${e.fleetId ? e.fleetId.slice(0, 8) + "…" : ""}
      </div>
    `).join("");
  }

  function updateStats() {
    document.getElementById("stat-fleets").textContent = Object.keys(AP3X.store.fleets).length;
    document.getElementById("stat-deployments").textContent = Object.keys(AP3X.store.deployments).length;
    document.getElementById("stat-events").textContent = AP3X.store.events.length;
  }

  function refreshFleets() {
    AP3X.store = JSON.parse(localStorage.getItem("ap3x_store") || '{"fleets":{},"fleetBrands":{},"deployments":{},"events":[]}');
    renderFleets();
    renderEventLog();
    updateStats();
    showToast("Refreshed");
  }

  function clearEvents() {
    AP3X.store.events = [];
    saveStore();
    renderEventLog();
    updateStats();
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  // Init
  renderFleets();
  renderEventLog();
  updateStats();

  // Expose for fleet-create redirect
  window.AP3X_createFleet = createFleet;
</script>
</body>
</html>

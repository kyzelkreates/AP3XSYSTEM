<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP3X — Create Fleet</title>
  <style>
    :root {
      --purple: #7C3AED;
      --dark: #0F0F1A;
      --card: #1A1A2E;
      --border: #2E2E4A;
      --text: #E2E8F0;
      --muted: #94A3B8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: var(--card);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: var(--purple); letter-spacing: 2px; }
    .back { font-size: 0.85rem; color: var(--muted); cursor: pointer; text-decoration: none; }
    .back:hover { color: var(--text); }
    main { padding: 2rem; max-width: 560px; margin: 0 auto; }
    .form-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
    }
    .form-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .form-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.75rem; }
    label { display: block; font-size: 0.78rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 0.4rem; }
    input, select {
      width: 100%; background: #0F0F1A; border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 0.65rem 0.9rem;
      font-size: 0.9rem; outline: none; margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: var(--purple); }
    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .color-row input[type="color"] {
      padding: 0.2rem; height: 2.5rem; cursor: pointer; border-radius: 8px;
    }
    .btn {
      width: 100%; padding: 0.75rem; border-radius: 10px; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; border: none; background: var(--purple);
      color: #fff; transition: opacity 0.2s; letter-spacing: 0.5px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      margin-top: 0.75rem;
    }
    .success-box {
      display: none; background: #14532D; border: 1px solid #166534;
      border-radius: 10px; padding: 1rem 1.25rem; margin-top: 1.25rem;
      font-size: 0.85rem; color: #4ADE80;
    }
    .success-box strong { display: block; margin-bottom: 0.35rem; font-size: 0.95rem; }
    .mono { font-family: monospace; font-size: 0.78rem; color: #86EFAC; }
  </style>
</head>
<body>
<header>
  <h1>⬡ AP3X</h1>
  <a class="back" href="dashboard.html">← Back to Dashboard</a>
</header>
<main>
  <div class="form-card">
    <div class="form-title">Create New Fleet</div>
    <div class="form-sub">Define fleet identity and initial branding. No routing or driver logic here.</div>

    <label>Fleet Name</label>
    <input type="text" id="fleet-name" placeholder="e.g. Night Shift Alpha" />

    <label>Primary Colour</label>
    <div class="color-row">
      <div>
        <input type="color" id="primary-color" value="#7C3AED" />
      </div>
      <div>
        <label style="margin-bottom:0.4rem">Secondary Colour</label>
        <input type="color" id="secondary-color" value="#1E1E2E" />
      </div>
    </div>

    <label>Logo URL (optional)</label>
    <input type="text" id="logo-url" placeholder="https://..." />

    <button class="btn" onclick="submitFleet()">⬡ Create Fleet</button>
    <button class="btn btn-outline" onclick="location.href='dashboard.html'">Cancel</button>

    <div class="success-box" id="success-box">
      <strong>✓ Fleet Created</strong>
      <div class="mono" id="success-id"></div>
    </div>
  </div>
</main>

<script>
  function loadStore() {
    return JSON.parse(localStorage.getItem("ap3x_store") || '{"fleets":{},"fleetBrands":{},"deployments":{},"events":[]}');
  }
  function saveStore(store) {
    localStorage.setItem("ap3x_store", JSON.stringify(store));
  }
  function emitEvent(store, event) {
    const enriched = { id: crypto.randomUUID(), timestamp: Date.now(), status: "pending", ...event };
    store.events.push(enriched);
    return enriched;
  }

  function submitFleet() {
    const name = document.getElementById("fleet-name").value.trim();
    if (!name) { alert("Fleet name is required."); return; }

    const store = loadStore();
    const fleetId = crypto.randomUUID();

    store.fleets[fleetId] = {
      id: fleetId,
      name,
      createdAt: Date.now(),
      status: "active",
      config: { vehicles: [], drivers: [], rules: {} }
    };

    emitEvent(store, { type: "fleet.created", fleetId, payload: store.fleets[fleetId] });

    const brand = {
      logo: document.getElementById("logo-url").value.trim() || null,
      primaryColor: document.getElementById("primary-color").value,
      secondaryColor: document.getElementById("secondary-color").value,
      updatedAt: Date.now()
    };

    store.fleetBrands[fleetId] = brand;
    emitEvent(store, { type: "fleet.brand.updated", fleetId, payload: brand });

    saveStore(store);

    document.getElementById("success-box").style.display = "block";
    document.getElementById("success-id").textContent = `Fleet ID: ${fleetId}`;

    setTimeout(() => location.href = `fleet-detail.html?id=${fleetId}`, 1800);
  }
</script>
</body>
</html>
